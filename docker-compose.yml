services:
  fastapi:
    build:
      context: .
      dockerfile: app/Dockerfile
    # [핵심 교정] 대괄호 형태로 정의된 Exec Form인지 확인 (sh -c 문자열 제거)
    entrypoint: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
      # [핵심 교정] 로컬 .venv 덮어쓰기 방지용 익명 볼륨이 누락되었는지 확인
      - /workspace/.venv
      - static_volume:/workspace/static
      - media_volume:/workspace/media
    env_file:
      - .env
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthcheck', timeout=5).getcode()"]
      interval: 5s
      timeout: 5s
      retries: 3
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_volume:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USER}", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mysql_volume:
  static_volume:
  media_volume: